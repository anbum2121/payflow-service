# App
spring.application.name=payflow-service

# H2 In-Memory Database (for local dev)
spring.datasource.url=jdbc:h2:mem:payflowdb
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true

# H2 Console (access via browser)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Kafka bootstrap server
spring.kafka.bootstrap-servers=localhost:9092

# Disable Kafka and Redis autoconfiguration
#spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration,org.springframework.boot.autoconfigure.kafka.KafkaAutoConfiguration

# Server
server.port=8080

# Kafka consumer
spring.kafka.consumer.group-id=payflow-group
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.apache.kafka.common.serialization.StringSerializer